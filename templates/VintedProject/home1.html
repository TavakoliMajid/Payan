
<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name = viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Interactive Image Map</title>
    <style>
        .image-container {
            width: 100%;
            height: 100vh;
            background-image: url("{% static 'VintedProject/My_Image.png' %}");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            position: relative;
        }
    .content {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
        }

        /* Make the clickable areas fit within the container */
        area {
            outline: none;
        }
    </style>
    {% load static %}
</head>
<body>
<h1></h1>
<p></p>
<img src="{% static 'VintedProject/My_Image.png' %}" usemap="#image-map" calss = "responsive_img" alt="Interactive Image">

<map name="image-map">
        <!-- Define clickable areas with the coordinates generated by Image Map Generator -->
        <area target="_blank" alt="Instagram" title="Instagram" href="https://www.instagram.com/meitipp?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" coords="258,567,67,614" shape="rect">
        <area target="_blank" alt="Telegram" title="Telegram" href="https://t.me/majidtavakoli7" coords="347,709,371,673" shape="rect">
        <area target="_blank" alt="Another Link" title="Another Link" href="https://example.com" coords="475,706,428,671" shape="rect">
    </map>
</body>
</html>
